name: CI/CD - MySQL Setup

on:
  workflow_dispatch:

jobs:
  setup-mysql:
    name: Levantar MySQL en EC2 Backend
    runs-on: ubuntu-latest

    steps:
      - name: Setup MySQL en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker network create backend-net || true
            docker stop mysqldb || true
            docker rm mysqldb || true
            docker run -d \
              --name mysqldb \
              --network backend-net \
              --restart unless-stopped \
              -e MYSQL_ROOT_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e MYSQL_DATABASE=despacho_db \
              -v mysql-data:/var/lib/mysql \
              -p 3306:3306 \
              mysql:8.0
            sleep 15
            docker exec mysqldb mysql -uroot -p${{ secrets.DB_PASSWORD }} -e "CREATE DATABASE IF NOT EXISTS ventas_db;"
            echo 'MySQL listo con despacho_db y ventas_db'
