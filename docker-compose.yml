services:

  mysql:
    image: mysql:8.0
    container_name: mysqldb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: despacho_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ms-despacho:
    build: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    container_name: msdespacho
    restart: on-failure
    environment:
      DB_HOST: mysqldb
      DB_PORT: 3306
      DB_NAME: despacho_db
      DB_USERNAME: root
      DB_PASSWORD: root123
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  ms-ventas:
    build: ./back-Ventas_SpringBoot/Springboot-API-REST
    container_name: msventas
    restart: on-failure
    environment:
      DB_HOST: mysqldb
      DB_PORT: 3306
      DB_NAME: ventas_db
      DB_USERNAME: root
      DB_PASSWORD: root123
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./front_despacho
      args:
        VITE_API_DESPACHO: http://localhost:8081
        VITE_API_VENTAS: http://localhost:8082
    container_name: frontendapp
    ports:
      - "80:80"
    depends_on:
      - ms-despacho
      - ms-ventas
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
